version: "3.8"

services:
  team_1_db:
    image: postgis/postgis:15-3.3 # PostgreSQL 15 + PostGIS 3.3 조합
    container_name: team_1_db
    restart: always
    env_file:
      - ".env"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data # 데이터 영구 저장
      # - ./database/init/:/docker-entrypoint-initdb.d/ # 초기화 스크립트 자동 실행(수정 필요)
    networks:
      - park_network

  team_1_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: team_1_backend
    env_file:
      - "./.env"
    # 덮어쓸 환경 변수 목록 기재
    environment:
      DB_HOST: team_1_db
      DB_PORT: 5432
    ports:
      - "5000:5000"
    volumes:
      - "./backend:/app"
    networks:
      - park_network

  team_1_frontend:
    image: node:20-alpine
    container_name: team_1_frontend
    working_dir: /app
    env_file:
      - ".env"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./nginx/build:/app/build
    command: sh -c "npm install  && npm run build"

  team_1_nginx:
    image: nginx:alpine
    container_name: team_1_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/build:/app/build
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - team_1_frontend
      - team_1_backend
    networks:
      - park_network
    command: ["nginx", "-g", "daemon off;"]

networks:
  park_network:
    driver: bridge
